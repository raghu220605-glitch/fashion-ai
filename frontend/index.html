<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Fashion Stylist</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <div class="header">
      <h1>👗 AI Fashion Stylist</h1>
      <p>Powered by Gemini AI</p>
    </div>

    <div class="form-group">
      <label for="skinTone">Your Skin Tone</label>
      <select id="skinTone">
        <option value="fair">Fair / Light</option>
        <option value="medium">Medium / Tan</option>
        <option value="dark">Dark / Deep</option>
      </select>
    </div>

    <div class="form-group">
      <label for="itemType">What are you looking for?</label>
      <select id="itemType">
        <option value="complete outfit">Complete Outfit</option>
        <option value="formal dress">Formal Wear</option>
        <option value="casual top">Casual Top</option>
        <option value="work attire">Office / Work Attire</option>
      </select>
    </div>

    <button id="recommendBtn">Get AI Recommendations</button>

    <div id="status" class="status-message"></div>

    <section id="result" class="hidden">
      <hr>
      <h2>Personalized Suggestions</h2>
      <ul id="recommendations"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

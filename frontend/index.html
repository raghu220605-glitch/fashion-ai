<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Outfit Recommender</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <div class="input-group">
    <h2>Find your perfect outfit ✦</h2>
    <div class="row">
      <input type="text" id="styleInput" placeholder="Describe your style or occasion…" />
      <select id="styleSelect">
        <option value="Casual">Casual</option>
        <option value="Formal">Formal</option>
        <option value="Streetwear">Streetwear</option>
        <option value="Boho">Boho</option>
        <option value="Party">Party</option>
      </select>
    </div>
    <button id="recommendBtn">Get recommendations</button>
    <div id="status" style="margin-top: 15px; font-size: 0.9rem; color: var(--accent);"></div>
  </div>

  <p class="section-title">Recommended for you</p>
  <ul id="recommendations">
      </ul>
</main>
<script src="script.js"></script>
</body>
</html>
